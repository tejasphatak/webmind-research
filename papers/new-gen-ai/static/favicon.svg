  <line x1="390" y1="360" x2="256" y2="440" stroke="#06B6D4" stroke-width="12" stroke-dasharray="16, 16" stroke-linecap="round" />

  <circle cx="120" cy="150" r="32" fill="url(#nodeGradient)" />
  <circle cx="390" cy="150" r="40" fill="url(#nodeGradient)" />
  <circle cx="120" cy="360" r="36" fill="url(#nodeGradient)" />
