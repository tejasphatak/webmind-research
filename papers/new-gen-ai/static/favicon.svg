<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="guruGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <stop offset="100%" stop-color="#7C3AED" /> </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" /> <stop offset="100%" stop-color="#3B82F6" /> </linearGradient>
  </defs>

  <rect width="512" height="512" fill="transparent"/>

  <g stroke="#94A3B8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <line x1="256" y1="256" x2="120" y2="150" />
    <line x1="256" y1="256" x2="390" y2="150" />
    <line x1="256" y1="256" x2="120" y2="360" />
    <line x1="256" y1="256" x2="390" y2="360" />

    <line x1="390" y1="150" x2="460" y2="256" />
    <line x1="120" y1="360" x2="256" y2="440" />
