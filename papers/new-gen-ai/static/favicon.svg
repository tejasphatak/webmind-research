  <circle cx="460" cy="256" r="16" fill="#3B82F6" opacity="0.8" />
  <circle cx="256" cy="440" r="20" fill="#3B82F6" opacity="0.8" />
  <circle cx="60" cy="256" r="14" fill="#3B82F6" opacity="0.8" />

  <circle cx="256" cy="256" r="72" fill="url(#guruGradient)" />

  <circle cx="256" cy="256" r="32" fill="#FFFFFF" opacity="0.2" />
